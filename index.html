<style>
*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:16px;
background:linear-gradient(180deg,#1a1333,#0d0f2d);
}

.card{
width:100%;
max-width:480px;
padding:28px;
border-radius:24px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(14px);
box-shadow:0 15px 40px rgba(0,0,0,0.45);
color:#fff;
}

.tag{
display:inline-block;
padding:8px 16px;
border-radius:20px;
background:rgba(255,255,255,0.12);
font-size:13px;
margin-bottom:16px;
}

.title{
font-size:26px;
font-weight:700;
margin-bottom:12px;
line-height:1.3;
}

.desc{
font-size:14px;
color:#cfcfcf;
margin-bottom:22px;
line-height:1.6;
}

.item{
display:flex;
align-items:flex-start;
background:rgba(255,255,255,0.08);
padding:16px;
border-radius:16px;
margin-bottom:12px;
font-size:14px;
line-height:1.5;
}

.dot{
width:10px;
height:10px;
background:#ff4d8d;
border-radius:50%;
margin-right:12px;
margin-top:6px;
flex-shrink:0;
}

.btn{
margin-top:24px;
display:block;
text-align:center;
padding:18px;
border-radius:18px;
font-weight:700;
text-decoration:none;
background:linear-gradient(45deg,#ff2d6f,#ff4d8d);
box-shadow:0 10px 30px rgba(255,0,100,0.35);
color:#fff;
font-size:16px;
transition:0.2s ease;
}

.btn:hover{
transform:translateY(-1px);
}

.note{
font-size:12px;
color:#a9a9a9;
margin-top:18px;
text-align:center;
line-height:1.5;
}

<div class="item">
<div class="dot"></div>

</div>

<div class="dot"></div>

</div>
